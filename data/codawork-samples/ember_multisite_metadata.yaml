# EMBER Multi-Site Electricity Composition Bundle
# CoDaWork-ready format for compositional data analysis

domain: "EMBER Electricity Generation"
description: >
  Yearly electricity generation by fuel type, normalized to proportions
  summing to 1. Extracted from EMBER yearly_full_release_long_format.csv
  (CC BY 4.0). This is the lead demonstration dataset for the MC-4
  composition monitoring claim.

carrier:
  - Coal
  - Gas
  - Nuclear
  - Hydro
  - Solar
  - Wind
  - Bioenergy
  - Other_Fossil
  - Other_Renew

sites:
  Germany:
    years: 2000-2025
    observations: 26
    key_event: "2022 gas crisis, nuclear phase-out"
    note: "Lead case for deceptive drift detection (p=0.0016 in monthly deseasonalized form)"
  Japan:
    years: 2000-2024
    observations: 25
    key_event: "2011 Fukushima, nuclear shutdown"
    note: "Dramatic structural shift visible in carrier composition"
  United Kingdom:
    years: 2000-2025
    observations: 26
    key_event: "Coal phase-out 2016-2025"
    note: "Coal share drops from 0.32 to 0.001 over 25 years"

normalization: "Row sums to 1 (proportions of total generation)"

zero_handling: >
  Near-zero values retained as reported. Solar and wind start at 0 or
  near-0 in early years. No imputation applied. CoDa reviewers should
  note that strict log-ratio transforms require zero replacement;
  the raw proportions are provided for transparency.

intended_analyses:
  - "Aitchison geometry: clr/ilr/alr transforms"
  - "Compositional time-series trajectory on the simplex"
  - "K_eff (effective complexity) tracking over time"
  - "TV distance between consecutive periods"
  - "Cross-site comparison of structural drift patterns"
  - "Deceptive drift detection: K_eff declining while velocity quiet"

source_file: "ember_multisite_compositions.csv"
schema_version: "1.0"
prepared_by: "Claude (Opus 4.6), directed by Peter Higgins"
date: "2026-03-30"
license: "CC BY 4.0 (inherits from EMBER source data)"
